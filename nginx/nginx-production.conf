user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Log format detallado para debugging de timeouts WiFi
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log detailed;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Timeouts extendidos para conexiones WiFi inestables
    keepalive_timeout 300;
    keepalive_requests 1000;
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;

    # Reset timedout connection para limpiar conexiones muertas
    reset_timedout_connection on;

    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Brotli compression (mejor compresión que gzip ~15-20%)
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # Upstream backend service
    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check endpoint (for Docker healthcheck)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Redirect www to non-www (HTTPS)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name www.moiskimdo.es;

        # SSL certificates (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/moiskimdo.es/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/moiskimdo.es/privkey.pem;

        # Redirect to non-www
        return 301 https://moiskimdo.es$request_uri;
    }

    # Main HTTPS server (non-www)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name moiskimdo.es;

        # SSL certificates (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/moiskimdo.es/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/moiskimdo.es/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/moiskimdo.es/chain.pem;

        # SSL configuration (Mozilla Modern)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL session optimization
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self'" always;

        # Root directory for Angular static files
        root /usr/share/nginx/html;
        index index.html;

        # Redirect legacy home path to root
        location = /inicio {
            return 301 /;
        }
        location = /inicio/ {
            return 301 /;
        }

        # Private SPA routes should never be indexed
        # Exclude OAuth callback path (/login/oauth2/) from this matcher.
        location ~* ^/(?!login/oauth2/)(login|recuperar-contrasena|reset-password|registro-confirmar|adminpage|userpage|alumnos[^/]*|grupos[^/]*|gestionarAlumnos[^/]*|seleccionarAlumnos[^/]*|gestionarTurnosAlumno[^/]*|turnos(Crear|Editar)|eventos(Listar|Crear|Editar)|productos(Listar|Crear|Editar)|convocatoriasListar|configuracion-sistema)(/|$) {
            add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        }

        # Event image endpoint - avoid proxy buffering issues on concurrent loads
        location ~* ^/api/eventos/[0-9]+/imagen$ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive connection con backend
            proxy_set_header Connection "";

            # Headers for proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts extendidos para WiFi
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Stream directly to the client to avoid truncation under load
            proxy_buffering off;
            proxy_request_buffering off;

            # Retry automático en errores temporales
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        # API proxy to Spring Boot backend
        # Document download endpoints - stream directly to avoid HTTP/2 truncation/reset issues
        location ~* ^/api/(alumnos/[0-9]+/documentos/[0-9]+/descargar|eventos/[0-9]+/documentos/[0-9]+/descargar)$ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive connection con backend
            proxy_set_header Connection "";

            # Headers for proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts extendidos para WiFi
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Stream directly to client to avoid buffering/protocol issues
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_max_temp_file_size 0;

            # Avoid content-encoding transformations on binary downloads
            gzip off;
            brotli off;

            # Retry automÃ¡tico en errores temporales
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        # Material de examen (temario/documentos/videos) - stream directly to avoid HTTP/2 reset/truncation issues
        location ~* ^/api/alumnos/[0-9]+/deportes/[^/]+/material-examen/(temario|documentacion/[^/?]+|videos/[^/?]+)$ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive connection con backend
            proxy_set_header Connection "";

            # Headers for proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Accept-Encoding "";

            # Timeouts extendidos para WiFi
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Stream directly to client to avoid buffering/protocol issues
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_max_temp_file_size 0;

            # Avoid content-encoding transformations on binary content
            gzip off;
            brotli off;

            # Retry automático en errores temporales
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive connection con backend
            proxy_set_header Connection "";

            # Headers for proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support (if needed)
            proxy_set_header Upgrade $http_upgrade;

            # Timeouts extendidos para WiFi
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Buffering mejorado para respuestas grandes
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 24 8k;
            proxy_busy_buffers_size 16k;
            proxy_max_temp_file_size 2048m;

            # Retry automático en errores temporales
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        # Login endpoint with stricter rate limiting
        location /api/auth/signin {
            limit_req zone=login_limit burst=3 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OAuth2 authorization endpoints
        location /oauth2/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # OAuth2 requires redirect handling
            proxy_redirect off;
        }

        # OAuth2 callback endpoint
        location /login/oauth2/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # OAuth2 requires redirect handling
            proxy_redirect off;
        }

        # Serve images from backend (proxied to Spring Boot)
        location /imagenes/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive
            proxy_set_header Connection "";

            # Timeouts para archivos grandes
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Buffers para imágenes grandes
            # Stream large files directly to avoid temp file buffering
            proxy_buffering off;

            # Caching for images
            proxy_cache_valid 200 1h;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;

            # Image-specific headers
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Serve documents from backend (proxied to Spring Boot)
        location /documentos/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Keepalive
            proxy_set_header Connection "";

            # Timeouts para archivos grandes
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Buffers para documentos grandes
            # Stream large files directly to avoid temp file buffering
            proxy_buffering off;

            # No caching for documents (security)
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Angular static files
        location / {
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|webm|mp4|avif)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # Don't cache index.html
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-cache, must-revalidate, max-age=0";
            }
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
