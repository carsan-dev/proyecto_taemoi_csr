server {
    listen 80;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect legacy home path to root
    location = /inicio {
        return 301 /;
    }
    location = /inicio/ {
        return 301 /;
    }
    location = /defensapersonalfemenina {
        return 301 /defensa-personal-femenina;
    }
    location = /defensapersonalfemenina/ {
        return 301 /defensa-personal-femenina;
    }

    # Private SPA routes should never be indexed
    location ~* ^/(login|recuperar-contrasena|reset-password|registro-confirmar|adminpage|userpage|alumnos[^/]*|grupos[^/]*|gestionarAlumnos[^/]*|seleccionarAlumnos[^/]*|gestionarTurnosAlumno[^/]*|turnos(Crear|Editar)|eventos(Listar|Crear|Editar)|productos(Listar|Crear|Editar)|convocatoriasListar|configuracion-sistema)(/|$) {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self'" always;

    # Ensure .mjs is served as JavaScript modules (some nginx images map it to octet-stream)
    location ~* \.mjs$ {
        try_files $uri =404;
        default_type application/javascript;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # Cache static assets with versioned filenames (e.g., main.abc123.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|webm|mp4|avif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML files (for SPA updates)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Short cache for index.html
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }

    # Event image endpoint - avoid proxy buffering issues on concurrent loads
    location ~* ^/api/eventos/[0-9]+/imagen$ {
        proxy_pass http://backend;

        # Timeouts generosos para conexiones WiFi inestables
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Keepalive entre nginx-backend
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers existentes
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream directly to the client to avoid truncation under load
        proxy_buffering off;
        proxy_request_buffering off;

        # Retry automático en caso de errores temporales
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # Disable caching for API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /api/ {
        proxy_pass http://backend/api/;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        # Timeouts generosos para conexiones WiFi inestables
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Keepalive entre nginx-backend
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers existentes
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffers para respuestas grandes
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 24 4k;
        proxy_busy_buffers_size 8k;
        proxy_max_temp_file_size 2048m;

        # Retry automático en caso de errores temporales
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # Disable caching for API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Proxy requests for images to backend
    location /imagenes/ {
        proxy_pass http://backend/imagenes/;

        # Timeouts para archivos grandes
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffers para imágenes grandes
        # Stream large files directly to avoid temp file buffering
        proxy_buffering off;

        # Enable caching for images (1 hour)
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Proxy requests for documents to backend
    location /documentos/ {
        proxy_pass http://backend/documentos/;

        # Timeouts para archivos grandes
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffers para documentos grandes
        # Stream large files directly to avoid temp file buffering
        proxy_buffering off;

        # Disable caching for documents (they might be updated)
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
