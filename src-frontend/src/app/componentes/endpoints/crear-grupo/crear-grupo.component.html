<div class="admin-page-container">
  <div class="container">
    <!-- Page Header -->
    <div class="admin-page-header">
      <h2>
        <i class="bi bi-people-fill"></i>
        Crear Nuevo Grupo
      </h2>
      <p>Crea un grupo para organizar a los alumnos por clases o actividades</p>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-6">
        <div class="admin-card admin-card-large">
          <form [formGroup]="grupoForm" (ngSubmit)="crearGrupo()" method="post">

            <!-- Form Field -->
            <div class="row g-3 mb-4">
              <div class="col-12">
                <label for="nombre" class="form-label fw-semibold">Nombre del Grupo</label>
                <input type="text" formControlName="nombre" id="nombre" class="admin-form-control" placeholder="Nombre del grupo">
                <div *ngIf="grupoForm.get('nombre')?.errors && grupoForm.get('nombre')?.touched" class="text-danger mt-1">
                  <small *ngIf="grupoForm.get('nombre')?.errors?.['required']">Nombre del grupo es obligatorio.</small>
                  <small *ngIf="grupoForm.get('nombre')?.errors?.['maxlength']">Nombre del grupo no puede superar los 50 caracteres.</small>
                </div>
              </div>
            </div>

            <!-- Submit Buttons -->
            <div class="d-flex gap-3 justify-content-end mt-4">
              <button type="button" class="admin-btn admin-btn-outline" (click)="volver()">
                <i class="bi bi-x-circle"></i>
                <span>Cancelar</span>
              </button>
              <button type="submit" class="admin-btn admin-btn-primary" [disabled]="grupoForm.invalid">
                <i class="bi bi-check-circle"></i>
                <span>Crear Grupo</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
