<div class="admin-page-container">
  <div class="container">
    <!-- Page Header -->
    <div class="admin-page-header">
      <h2>
        <i class="bi bi-pencil-square"></i>
        Editar Turno
      </h2>
      <p>Modifica el horario del turno</p>
    </div>

    <!-- Skeleton Loading -->
    <div *ngIf="cargando" class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-8">
        <div class="admin-card admin-card-large">
          <div class="admin-form-section">
            <div class="section-title">
              <div class="skeleton-line skeleton-title" style="width: 250px; height: 24px;"></div>
            </div>
            <div class="skeleton-line" style="width: 100%; height: 40px; margin-bottom: 16px;"></div>
            <div class="row g-3">
              <div class="col-6">
                <div class="skeleton-line" style="width: 100%; height: 40px;"></div>
              </div>
              <div class="col-6">
                <div class="skeleton-line" style="width: 100%; height: 40px;"></div>
              </div>
            </div>
          </div>
          <div class="admin-form-button-group">
            <div class="skeleton-button" style="width: 120px; height: 42px;"></div>
            <div class="skeleton-button" style="width: 140px; height: 42px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Form Card -->
    <div *ngIf="!cargando" class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-8">
        <div class="admin-card admin-card-large">
          <form [formGroup]="turnoForm" (ngSubmit)="onSubmit()" method="post">

            <!-- Información del Horario -->
            <div class="admin-form-section">
              <div class="section-title">
                <i class="bi bi-calendar-week"></i>
                <h4>Información del Horario</h4>
              </div>

              <div class="row g-3">
                <!-- Día de la semana -->
                <div class="col-12">
                  <div class="admin-form-field" [class.is-invalid]="turnoForm.get('diaSemana')?.errors && turnoForm.get('diaSemana')?.touched" [class.is-valid]="turnoForm.get('diaSemana')?.valid && turnoForm.get('diaSemana')?.touched">
                    <label for="diaSemana">
                      <i class="bi bi-calendar3"></i>
                      Día de la Semana
                      <span class="required">*</span>
                    </label>
                    <select
                      formControlName="diaSemana"
                      id="diaSemana"
                      class="admin-form-control form-select"
                      aria-label="Día de la semana"
                      aria-required="true">
                      <option *ngFor="let dia of diasSemana" [value]="dia">{{ dia }}</option>
                    </select>
                    <div *ngIf="turnoForm.get('diaSemana')?.errors && turnoForm.get('diaSemana')?.touched" class="invalid-feedback">
                      <i class="bi bi-exclamation-circle"></i>
                      El día de la semana es obligatorio
                    </div>
                  </div>
                </div>

                <!-- Hora de inicio y hora de fin -->
                <div class="col-12 col-md-6">
                  <div class="admin-form-field" [class.is-invalid]="turnoForm.get('horaInicio')?.errors && turnoForm.get('horaInicio')?.touched" [class.is-valid]="turnoForm.get('horaInicio')?.valid && turnoForm.get('horaInicio')?.touched">
                    <label for="horaInicio">
                      <i class="bi bi-clock"></i>
                      Hora de Inicio
                      <span class="required">*</span>
                    </label>
                    <input
                      type="time"
                      formControlName="horaInicio"
                      id="horaInicio"
                      class="admin-form-control"
                      aria-label="Hora de inicio"
                      aria-required="true">
                    <div *ngIf="turnoForm.get('horaInicio')?.errors && turnoForm.get('horaInicio')?.touched" class="invalid-feedback">
                      <i class="bi bi-exclamation-circle"></i>
                      <span *ngIf="turnoForm.get('horaInicio')?.errors?.['required']">La hora de inicio es obligatoria</span>
                      <span *ngIf="turnoForm.get('horaInicio')?.errors?.['pattern']">Formato HH:mm requerido</span>
                    </div>
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <div class="admin-form-field" [class.is-invalid]="turnoForm.get('horaFin')?.errors && turnoForm.get('horaFin')?.touched" [class.is-valid]="turnoForm.get('horaFin')?.valid && turnoForm.get('horaFin')?.touched">
                    <label for="horaFin">
                      <i class="bi bi-clock-fill"></i>
                      Hora de Fin
                      <span class="required">*</span>
                    </label>
                    <input
                      type="time"
                      formControlName="horaFin"
                      id="horaFin"
                      class="admin-form-control"
                      aria-label="Hora de fin"
                      aria-required="true">
                    <div *ngIf="turnoForm.get('horaFin')?.errors && turnoForm.get('horaFin')?.touched" class="invalid-feedback">
                      <i class="bi bi-exclamation-circle"></i>
                      <span *ngIf="turnoForm.get('horaFin')?.errors?.['required']">La hora de fin es obligatoria</span>
                      <span *ngIf="turnoForm.get('horaFin')?.errors?.['pattern']">Formato HH:mm requerido</span>
                    </div>
                  </div>
                </div>

                <!-- Error de validación de horas -->
                <div class="col-12" *ngIf="turnoForm.errors?.['horasInvalidas']">
                  <div class="admin-alert admin-alert-danger">
                    <i class="bi bi-exclamation-triangle"></i>
                    <span>La hora de inicio debe ser anterior a la hora de fin</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Submit Buttons -->
            <div class="admin-form-button-group">
              <button
                type="button"
                class="admin-btn admin-btn-outline"
                (click)="volver()"
                aria-label="Cancelar y volver al listado">
                <i class="bi bi-x-circle"></i>
                <span>Cancelar</span>
              </button>
              <button
                type="submit"
                class="admin-btn admin-btn-primary"
                [disabled]="turnoForm.invalid"
                aria-label="Actualizar turno">
                <i class="bi bi-check-circle"></i>
                <span>Actualizar Turno</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
