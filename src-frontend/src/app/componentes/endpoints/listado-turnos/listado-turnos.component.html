<div class="admin-page-container">
  <div class="container">
    <!-- Action Bar -->
    <div class="admin-action-bar">
      <h2>
        <i class="bi bi-clock-history"></i>
        Horario de Turnos
      </h2>
    </div>

    <!-- Skeleton Loading -->
    <app-skeleton-card *ngIf="cargando" type="list" [count]="7"></app-skeleton-card>

    <div *ngIf="!cargando">
      <!-- Días de la Semana -->
      <div class="row g-4">
        <div class="col-12" *ngFor="let diaSemana of diasSemana">
          <div class="admin-card">
            <div class="admin-section-header">
              <i class="bi bi-calendar-day"></i>
              <h4>{{ diaSemana }}</h4>
            </div>

            <!-- Comprobamos si hay turnos para este día -->
            <ng-container *ngIf="obtenerTurnosPorDia(turnos, diaSemana).length > 0; else noTurnos">
              <!-- Contenedor de Turnos -->
              <div class="d-flex flex-row flex-nowrap overflow-auto pb-3 gap-3">
                <!-- Tarjeta de turno -->
                <div class="admin-item-card flex-shrink-0" style="min-width: 300px;" *ngFor="let turno of obtenerTurnosPorDia(turnos, diaSemana)">
                  <div class="item-header">
                    <div class="item-title">
                      <h4>{{ turno.horaInicio }} - {{ turno.horaFin }}</h4>
                    </div>
                  </div>

                  <div class="item-body">
                    <div class="item-field">
                      <i class="bi bi-people"></i>
                      <strong>Grupo:</strong>
                      <span>{{ turno.grupoNombre ? turno.grupoNombre : 'Sin grupo' }}</span>
                    </div>
                    <div class="item-field">
                      <i class="bi bi-person-check"></i>
                      <strong>Alumnos:</strong>
                      <span>{{ obtenerTotalAlumnos(turno) }}</span>
                    </div>
                  </div>

                  <div class="item-footer">
                    <button class="admin-btn admin-btn-info admin-btn-sm" [routerLink]="['/seleccionarGrupo', turno.id]">
                      <i class="bi bi-people-fill"></i>
                      <span>Grupo</span>
                    </button>
                    <button class="admin-btn admin-btn-primary admin-btn-sm" [routerLink]="['/turnosEditar', turno.id]">
                      <i class="bi bi-pencil-square"></i>
                      <span>Editar</span>
                    </button>
                    <button class="admin-btn admin-btn-danger admin-btn-sm" (click)="eliminarTurno(turno.id)">
                      <i class="bi bi-trash"></i>
                      <span>Eliminar</span>
                    </button>
                  </div>
                </div>
              </div>
            </ng-container>

            <!-- Plantilla alternativa cuando no hay turnos -->
            <ng-template #noTurnos>
              <p class="text-muted fst-italic mb-0">No hay turnos en este día</p>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
