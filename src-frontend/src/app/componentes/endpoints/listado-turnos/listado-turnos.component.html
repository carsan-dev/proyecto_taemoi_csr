<div class="container py-5" *ngIf="endpointsService.turnos$ | async as turnos">
  <!-- TÍTULO PRINCIPAL -->
  <div class="row justify-content-center mb-4">
    <div class="col-12 text-center">
      <h2 class="fw-bold display-6">Horario de Turnos</h2>
    </div>
  </div>

  <!-- TARJETAS DE CONTEO DE ALUMNOS (opcional) -->
  <div class="row justify-content-center g-4 mb-4">
    <ng-container *ngFor="let tipo of gruposMostrar">
      <div class="col-12 col-sm-6 col-lg-3 d-flex justify-content-center">
        <div class="card alumnos-card" (click)="abrirModalAlumnos(tipo)" style="cursor: pointer;">
          <div class="card-body text-center">
            <h5 class="card-title">{{ tipo }}</h5>
            <p>{{ obtenerConteoAlumnos(tipo) }} alumnos</p>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- LISTADO DE DÍAS DE LA SEMANA, CADA UNO EN UNA FILA -->
  <div class="row g-4">
    <div class="col-12" *ngFor="let diaSemana of diasSemana">
      <h4 class="mb-2 text-primary border-bottom pb-2">{{ diaSemana }}</h4>

      <!-- Comprobamos si hay turnos para este día -->
      <ng-container *ngIf="obtenerTurnosPorDia(turnos, diaSemana).length > 0; else noTurnos">
        <!-- CONTENEDOR HORIZONTAL DE TURNOS (scrollable) -->
        <div class="d-flex flex-row flex-nowrap overflow-auto horizontal-turnos">
          <!-- Tarjeta de turno -->
          <div class="card turno-card me-3 flex-shrink-0" *ngFor="let turno of obtenerTurnosPorDia(turnos, diaSemana)">
            <div class="card-body p-3">
              <h5 class="text-muted mb-2">
                {{ turno.horaInicio }} - {{ turno.horaFin }}
              </h5>
              <p class="mb-1">
                <strong>Grupo:</strong>
                {{ turno.grupoNombre ? turno.grupoNombre : 'Sin grupo' }}
              </p>
              <p class="mb-1">
                <strong>Alumnos:</strong> {{ obtenerTotalAlumnos(turno) }}
              </p>
              <div class="mt-2">
                <button class="btn btn-secondary btn-sm me-1" [routerLink]="['/seleccionarGrupo', turno.id]">
                  Grupo
                </button>

                <button class="btn btn-primary btn-sm me-1" [routerLink]="['/turnosEditar', turno.id]">
                  <i class="bi bi-gear"></i> Editar
                </button>

                <button class="btn btn-danger btn-sm" (click)="eliminarTurno(turno.id)">
                  <i class="bi bi-trash"></i> Eliminar
                </button>
              </div>
            </div>
          </div>
        </div>
      </ng-container>

      <!-- Plantilla alternativa cuando no hay turnos -->
      <ng-template #noTurnos>
        <p class="text-muted fst-italic">No hay turnos en este día</p>
      </ng-template>
    </div>
  </div>
</div>

<!-- Modal de alumnos en un grupo -->
<app-grupo-alumnos-modal *ngIf="mostrarModalAlumnos" [grupoNombre]="grupoNombreModal" [alumnos]="alumnosGrupoModal"
  (cerrar)="cerrarModalAlumnos()">
</app-grupo-alumnos-modal>
