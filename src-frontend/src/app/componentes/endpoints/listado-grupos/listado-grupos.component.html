<div class="container py-5">
  <div class="row justify-content-center mb-5">
    <div class="col-md-8 text-center">
      <h2 class="fw-bold mb-4">Listado de Grupos</h2>
      <button class="btn btn-success" routerLink="/gruposCrear">
        Crear Nuevo Grupo
      </button>
    </div>
  </div>

  <div class="row">
    <div
      *ngFor="let grupo of grupos"
      class="col-md-6 col-lg-4 d-flex align-items-stretch justify-content-center"
    >
      <div class="card grupo-card my-3">
        <div class="card-body d-flex flex-column justify-content-between">
          <!-- Información del grupo -->
          <div>
            <p class="text-center card-title fw-bold">{{ grupo.nombre }}</p>
          </div>
          
          <!-- Botones de acciones del grupo -->
          <div class="d-flex flex-wrap justify-content-center mt-4">
            <button class="btn btn-primary btn-sm m-1" [routerLink]="['/turnosGrupo', grupo.id]">Gestionar Turnos</button>
            <button class="btn btn-primary btn-sm m-1" [routerLink]="['/gestionarAlumnos', grupo.id]">Gestionar Alumnos</button>
            <button class="btn btn-primary btn-sm m-1" [routerLink]="['/gruposEditar', grupo.id]">Editar</button>
            <button class="btn btn-danger btn-sm m-1" (click)="eliminarGrupo(grupo.id)">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
