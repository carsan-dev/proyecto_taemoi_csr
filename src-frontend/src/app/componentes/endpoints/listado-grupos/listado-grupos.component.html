<div class="admin-page-container">
  <div class="container">
    <!-- Action Bar -->
    <div class="admin-action-bar">
      <h2>
        <i class="bi bi-people-fill"></i>
        Gestión de Grupos
      </h2>
      <div class="action-buttons">
        <button class="admin-btn admin-btn-success" routerLink="/gruposCrear">
          <i class="bi bi-plus-circle"></i>
          <span>Crear Nuevo Grupo</span>
        </button>
      </div>
    </div>

    <!-- Stats Cards - Conteo de Alumnos -->
    <div class="admin-stats-grid mb-4">
      <ng-container *ngFor="let tipo of gruposMostrar">
        <div class="admin-stat-card" (click)="abrirModalAlumnos(tipo)" style="cursor: pointer;">
          <div class="stat-icon stat-icon-primary">
            <i class="bi bi-people-fill"></i>
          </div>
          <h3 class="stat-value">{{ obtenerConteoAlumnos(tipo).active }}</h3>
          <p class="stat-total">(Total: {{ obtenerConteoAlumnos(tipo).total }})</p>
          <p class="stat-label">{{ tipo }}</p>
        </div>
      </ng-container>
    </div>

    <!-- Grupos Grid -->
    <div class="admin-cards-grid">
      <div *ngFor="let grupo of grupos" class="admin-item-card">
        <div class="item-header">
          <div class="item-title">
            <h4>{{ grupo.nombre }}</h4>
          </div>
        </div>

        <div class="item-footer">
          <button class="admin-btn admin-btn-info admin-btn-sm" [routerLink]="['/turnosGrupo', grupo.id]">
            <i class="bi bi-clock"></i>
            <span>Turnos</span>
          </button>
          <button class="admin-btn admin-btn-primary admin-btn-sm" [routerLink]="['/gestionarAlumnos', grupo.id]">
            <i class="bi bi-person-lines-fill"></i>
            <span>Alumnos</span>
          </button>
          <button class="admin-btn admin-btn-primary admin-btn-sm" [routerLink]="['/gruposEditar', grupo.id]">
            <i class="bi bi-pencil-square"></i>
            <span>Editar</span>
          </button>
          <button class="admin-btn admin-btn-danger admin-btn-sm" (click)="eliminarGrupo(grupo.id)">
            <i class="bi bi-trash"></i>
            <span>Eliminar</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal de alumnos en un grupo -->
<app-grupo-alumnos-modal *ngIf="mostrarModalAlumnos" [grupoNombre]="grupoNombreModal" [alumnos]="alumnosGrupoModal"
  (cerrar)="cerrarModalAlumnos()">
</app-grupo-alumnos-modal>
