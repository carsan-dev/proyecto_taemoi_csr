<div class="admin-page-container">
  <div class="container mt-5">
    <div class="card p-4 shadow-sm">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-center m-0 fw-bold">
          <i class="bi bi-people-fill"></i>
          Gestionar Alumnos del Grupo
        </h2>
        <button type="button" class="btn btn-secondary btn-sm" (click)="volver()">
          <i class="bi bi-arrow-left"></i>
          Volver
        </button>
      </div>

      <ul class="mt-4 p-0">
        <li *ngFor="let alumno of alumnosPaginados" class="list-group-item d-flex justify-content-between align-items-center">
          <span>{{ alumno.nombre }} {{ alumno.apellidos }}</span>
          <div>
            <button class="btn btn-primary btn-sm me-2 rounded-pill" (click)="gestionarTurnos(alumno.id)">
              <i class="bi bi-clock-history"></i>
              Gestionar Turnos
            </button>
            <button class="btn btn-danger btn-sm rounded-pill" (click)="eliminarAlumno(alumno.id)">
              <i class="bi bi-trash"></i>
              Eliminar
            </button>
          </div>
        </li>
        <li *ngIf="!alumnosPaginados || alumnosPaginados.length === 0" class="list-group-item text-center text-muted">
          No hay alumnos en este grupo
        </li>
      </ul>

      <app-paginacion
        *ngIf="totalPaginas > 1"
        [paginaActual]="paginaActual"
        [totalPaginas]="totalPaginas"
        (pageChange)="cambiarPagina($event)">
      </app-paginacion>

      <div class="text-center mt-3">
        <button class="btn btn-primary" (click)="redirigirSeleccionarAlumnos()">
          <i class="bi bi-person-plus"></i>
          Agregar Alumnos
        </button>
      </div>
    </div>
  </div>
</div>
