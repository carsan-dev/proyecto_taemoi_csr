<div class="admin-page-container">
  <div class="container">
    <!-- Page Header -->
    <div class="admin-page-header">
      <h2>
        <i class="bi bi-pencil-square"></i>
        Editar Producto
      </h2>
      <p>Modifica la información del producto o servicio</p>
    </div>

    <!-- Skeleton Loading -->
    <div *ngIf="cargando" class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-6">
        <div class="admin-card admin-card-large">
          <div class="admin-form-section">
            <div class="section-title">
              <div class="skeleton-line skeleton-title" style="width: 250px; height: 24px;"></div>
            </div>
            <div class="skeleton-line" style="width: 100%; height: 40px; margin-bottom: 16px;"></div>
            <div class="skeleton-line" style="width: 100%; height: 40px;"></div>
          </div>
          <div class="admin-form-button-group">
            <div class="skeleton-button" style="width: 120px; height: 42px;"></div>
            <div class="skeleton-button" style="width: 140px; height: 42px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Form Card -->
    <div *ngIf="!cargando" class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-6">
        <div class="admin-card admin-card-large">
          <form [formGroup]="productoForm" (ngSubmit)="onSubmit()" method="post">

            <!-- Información del Producto -->
            <div class="admin-form-section">
              <div class="section-title">
                <i class="bi bi-tag"></i>
                <h4>Información del Producto</h4>
              </div>

              <div class="row g-3">
                <!-- Campo Concepto -->
                <div class="col-12">
                  <div class="admin-form-field" [class.is-invalid]="productoForm.get('concepto')?.errors && productoForm.get('concepto')?.touched" [class.is-valid]="productoForm.get('concepto')?.valid && productoForm.get('concepto')?.touched">
                    <label for="concepto">
                      <i class="bi bi-box-seam"></i>
                      Concepto / Nombre del Producto
                      <span class="required">*</span>
                    </label>
                    <input
                      type="text"
                      id="concepto"
                      formControlName="concepto"
                      class="admin-form-control"
                      placeholder="Ej: Mensualidad Enero, Derechos de Examen, Licencia Federativa"
                      aria-label="Concepto del producto"
                      aria-required="true">
                    <div *ngIf="productoForm.get('concepto')?.errors && productoForm.get('concepto')?.touched" class="invalid-feedback">
                      <i class="bi bi-exclamation-circle"></i>
                      El concepto es obligatorio
                    </div>
                    <div class="admin-form-help">
                      <i class="bi bi-info-circle"></i>
                      <span>Nombre descriptivo del producto o servicio</span>
                    </div>
                  </div>
                </div>

                <!-- Campo Precio -->
                <div class="col-12">
                  <div class="admin-form-field" [class.is-invalid]="productoForm.get('precio')?.errors && productoForm.get('precio')?.touched" [class.is-valid]="productoForm.get('precio')?.valid && productoForm.get('precio')?.touched">
                    <label for="precio">
                      <i class="bi bi-currency-euro"></i>
                      Precio (€)
                      <span class="required">*</span>
                    </label>
                    <div class="admin-input-group">
                      <div class="input-group-prepend">
                        <i class="bi bi-cash"></i>
                      </div>
                      <input
                        type="number"
                        id="precio"
                        formControlName="precio"
                        class="admin-form-control"
                        placeholder="0.00"
                        step="0.01"
                        min="0"
                        aria-label="Precio del producto"
                        aria-required="true">
                      <div class="input-group-append">€</div>
                    </div>
                    <div *ngIf="productoForm.get('precio')?.errors && productoForm.get('precio')?.touched" class="invalid-feedback">
                      <i class="bi bi-exclamation-circle"></i>
                      El precio es obligatorio y debe ser mayor o igual a 0
                    </div>
                    <div class="admin-form-help">
                      <i class="bi bi-info-circle"></i>
                      <span>Precio en euros (puede incluir decimales)</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Submit Buttons -->
            <div class="admin-form-button-group">
              <button
                type="button"
                class="admin-btn admin-btn-outline"
                (click)="volver()"
                aria-label="Cancelar y volver al listado">
                <i class="bi bi-x-circle"></i>
                <span>Cancelar</span>
              </button>
              <button
                type="submit"
                class="admin-btn admin-btn-primary"
                [disabled]="productoForm.invalid"
                aria-label="Actualizar producto">
                <i class="bi bi-check-circle"></i>
                <span>Actualizar Producto</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
