<div class="admin-page-container">
  <div class="container">
    <!-- Page Header -->
    <div class="admin-page-header">
      <h2>
        <i class="bi bi-box-seam"></i>
        Crear Nuevo Producto
      </h2>
      <p>Registra un producto o servicio para asignar a los alumnos</p>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-6">
        <div class="admin-card admin-card-large">
          <form [formGroup]="productoForm" (ngSubmit)="onSubmit()" method="post">

            <!-- Section Header -->
            <div class="admin-section-header">
              <i class="bi bi-tag"></i>
              <h4>Información del Producto</h4>
            </div>

            <!-- Campo Concepto -->
            <div class="row g-3 mb-4">
              <div class="col-12">
                <label for="concepto" class="form-label fw-semibold">Concepto</label>
                <input
                  type="text"
                  id="concepto"
                  formControlName="concepto"
                  class="admin-form-control"
                  placeholder="Nombre o concepto del producto"
                />
                <div
                  *ngIf="productoForm.get('concepto')?.errors && productoForm.get('concepto')?.touched"
                  class="text-danger mt-1"
                >
                  <small *ngIf="productoForm.get('concepto')?.errors?.['required']">El concepto es requerido.</small>
                </div>
              </div>
            </div>

            <!-- Campo Precio -->
            <div class="row g-3 mb-4">
              <div class="col-12">
                <label for="precio" class="form-label fw-semibold">Precio (€)</label>
                <input
                  type="number"
                  id="precio"
                  formControlName="precio"
                  class="admin-form-control"
                  placeholder="0.00"
                  step="0.01"
                  min="0"
                />
                <div
                  *ngIf="productoForm.get('precio')?.errors && productoForm.get('precio')?.touched"
                  class="text-danger mt-1"
                >
                  <small *ngIf="productoForm.get('precio')?.errors?.['required']">
                    El precio es requerido y debe ser mayor o igual a 0.
                  </small>
                </div>
              </div>
            </div>

            <!-- Submit Buttons -->
            <div class="d-flex gap-3 justify-content-end mt-4">
              <button type="button" class="admin-btn admin-btn-outline" (click)="volver()">
                <i class="bi bi-x-circle"></i>
                <span>Cancelar</span>
              </button>
              <button type="submit" class="admin-btn admin-btn-primary" [disabled]="productoForm.invalid">
                <i class="bi bi-check-circle"></i>
                <span>Crear Producto</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
