<!-- informe-modal.component.html -->
<div class="modal fade" [class.show]="modalVisible" tabindex="-1" role="dialog" style="display: block;">
  <div class="modal-dialog modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
    <div class="modal-content rounded-4 shadow-lg">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold">Generar Informe</h5>
        <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="informeTipo" id="informeGeneral" value="general" [(ngModel)]="selectedInforme">
          <label class="form-check-label" for="informeGeneral">Informe General</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="informeTipo" id="informeTaekwondo" value="taekwondo" [(ngModel)]="selectedInforme">
          <label class="form-check-label" for="informeTaekwondo">Informe Taekwondo por Grado</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="informeTipo" id="informeKickboxing" value="kickboxing" [(ngModel)]="selectedInforme">
          <label class="form-check-label" for="informeKickboxing">Informe Kickboxing por Grado</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
        <button type="button" class="btn btn-primary" [disabled]="!selectedInforme" (click)="generarInforme()">Generar Informe</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="modalVisible" (click)="cerrarModal()"></div>
