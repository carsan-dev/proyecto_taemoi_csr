<div class="modal fade" [class.show]="modalVisible" tabindex="-1" role="dialog" style="display: block;">
  <div class="modal-dialog modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
    <div class="modal-content rounded-4 shadow-lg">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold">{{ title }}</h5>
        <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <div *ngFor="let opcion of opcionesInforme" class="form-check mb-2">
          <input
            class="form-check-input"
            type="radio"
            name="informeTipo"
            [id]="opcion.value"
            [value]="opcion.value"
            [(ngModel)]="selectedInforme">
          <label class="form-check-label" [for]="opcion.value">{{ opcion.label }}</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
        <button type="button" class="btn btn-primary" [disabled]="!selectedInforme" (click)="generarInforme()">Generar Informe</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="modalVisible" (click)="cerrarModal()"></div>
