<div class="modal fade" [class.show]="modalVisible" tabindex="-1" role="dialog" style="display: block;"> 
  <div class="modal-dialog modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
    <div class="modal-content rounded-4 shadow-lg">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold">Alumnos de {{ grupoNombre }}</h5>
        <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <ul class="list-group">
          <li class="list-group-item list-group-item-action d-flex align-items-center" *ngFor="let alumno of alumnos">
            <a [routerLink]="['/alumnosEditar', alumno.id]" class="text-decoration-none text-dark w-100">
              <i class="bi bi-person-circle me-2 text-primary"></i>
              {{ alumno.nombre }} {{ alumno.apellidos }}
            </a>
          </li>
        </ul>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cerrarModal()">
          Cerrar
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="modalVisible" (click)="cerrarModal()"></div>
