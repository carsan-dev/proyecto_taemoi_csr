@if (isLoading) {
  <div class="carousel-skeleton-container">
    <div class="carousel-skeleton-track">
      <div class="skeleton-event-slide">
        <div class="skeleton-slide-image"></div>
        <div class="skeleton-slide-content">
          <div class="skeleton-line skeleton-title"></div>
          <div class="skeleton-line skeleton-desc"></div>
          <div class="skeleton-line skeleton-desc short"></div>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div
    class="modern-carousel-container"
    (mouseenter)="pauseAutoPlay()"
    (mouseleave)="resumeAutoPlay()"
  >
    <div
      class="carousel-track"
      [class.single-event]="eventos.length === 1"
    >
      @for (evento of eventos; track evento.id || $index; let i = $index) {
        <div
          class="event-slide"
          [class.active]="i === currentIndex"
        >
          <div class="event-slide-image-wrapper">
            <img
              [src]="getImageUrl(evento)"
              [alt]="evento.titulo"
              class="event-slide-image"
            />
            <div class="image-gradient-overlay"></div>
          </div>
          <div class="event-slide-content">
            <h3 class="event-slide-title">{{ evento.titulo }}</h3>
            <p class="event-slide-description">{{ evento.descripcion }}</p>
            <div class="event-slide-footer">
              <button
                class="event-slide-btn"
                [routerLink]="['/eventos', evento.id]"
              >
                <i class="bi bi-arrow-right-circle-fill"></i>
                <span>Ver detalles</span>
              </button>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Navigation Controls -->
    @if (eventos.length > 1) {
      <button
        class="carousel-control prev"
        (click)="prevSlide()"
        [disabled]="currentIndex === 0"
        aria-label="Evento anterior"
      >
        <i class="bi bi-chevron-left"></i>
      </button>

      <button
        class="carousel-control next"
        (click)="nextSlide()"
        [disabled]="currentIndex === eventos.length - 1"
        aria-label="Siguiente evento"
      >
        <i class="bi bi-chevron-right"></i>
      </button>

      <!-- Thumbnail Indicators -->
      <div class="carousel-indicators">
        @for (evento of eventos; track evento.id || $index; let i = $index) {
          <button
            class="indicator-dot"
            [class.active]="i === currentIndex"
            [style.background-image]="'url(' + getImageUrl(evento) + ')'"
            (click)="goToSlide(i)"
            [attr.aria-label]="'Ir al evento ' + (i + 1)"
          ></button>
        }
      </div>
    }
  </div>
}
