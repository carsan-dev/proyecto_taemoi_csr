<!-- List View Skeleton -->
<ng-container *ngIf="type === 'list'">
  <div class="skeleton-list">
    <div class="skeleton-card" *ngFor="let item of items">
      <div class="skeleton-card-header">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-header-content">
          <div class="skeleton-line skeleton-title"></div>
          <div class="skeleton-line skeleton-subtitle"></div>
        </div>
      </div>
      <div class="skeleton-card-body">
        <div class="skeleton-line skeleton-text"></div>
        <div class="skeleton-line skeleton-text short"></div>
      </div>
      <div class="skeleton-card-footer">
        <div class="skeleton-button"></div>
        <div class="skeleton-button"></div>
      </div>
    </div>
  </div>
</ng-container>

<!-- Grid View Skeleton -->
<ng-container *ngIf="type === 'grid'">
  <div class="skeleton-grid" [style.grid-template-columns]="'repeat(' + columns + ', 1fr)'">
    <div class="skeleton-card" *ngFor="let item of items">
      <div class="skeleton-image"></div>
      <div class="skeleton-card-body">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line skeleton-text"></div>
        <div class="skeleton-line skeleton-text short"></div>
      </div>
      <div class="skeleton-card-footer">
        <div class="skeleton-button full"></div>
      </div>
    </div>
  </div>
</ng-container>

<!-- Table View Skeleton -->
<ng-container *ngIf="type === 'table'">
  <div class="skeleton-table">
    <div class="skeleton-table-header">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
    <div class="skeleton-table-row" *ngFor="let item of items">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>
</ng-container>
