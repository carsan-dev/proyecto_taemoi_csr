@if (evento) {
  <div class="evento-detalle-page">
  <!-- Hero Header -->
  <div class="hero-header">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="breadcrumb-section">
        <button class="back-button" routerLink="/eventos">
          <i class="bi bi-arrow-left"></i>
          <span>Volver a eventos</span>
        </button>
      </div>
      <div class="page-title-section">
        <i class="bi bi-calendar-event-fill"></i>
        <h1>{{ evento.titulo }}</h1>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="content-wrapper">
      <!-- Event Image Section -->
      <div class="event-image-section">
        <div class="image-container">
          <img
            [src]="evento.fotoEvento?.url || '../../../../assets/media/default.webp'"
            [alt]="evento.titulo"
            class="event-detail-img"
          />
          <div class="image-gradient"></div>
          <button class="zoom-button" (click)="abrirModalImagen()" title="Ver imagen ampliada">
            <i class="bi bi-zoom-in"></i>
            <span>Ampliar imagen</span>
          </button>
        </div>
      </div>

      <!-- Event Description Section -->
      <div class="event-description-section">
        <div class="description-card">
          <div class="card-header">
            <i class="bi bi-info-circle"></i>
            <h2>Detalles del Evento</h2>
          </div>
          <div class="card-body">
            <p class="description-text">{{ evento.descripcion }}</p>
          </div>
          <div class="card-footer">
            <button class="action-button primary" routerLink="/eventos">
              <i class="bi bi-arrow-left-circle"></i>
              <span>Volver a eventos</span>
            </button>
          </div>
        </div>

        <!-- Documentos del Evento -->
        @if (evento.documentos && evento.documentos.length > 0) {
        <div class="documents-card">
          <div class="card-header">
            <i class="bi bi-file-earmark-arrow-down"></i>
            <h2>Documentos</h2>
          </div>
          <div class="card-body">
            <div class="documents-list">
              @for (doc of evento.documentos; track doc.id) {
              <button class="document-item" (click)="descargarDocumento(doc.url)">
                <i class="bi" [ngClass]="getFileIcon(doc.tipo)"></i>
                <span class="document-name">{{ doc.nombre }}</span>
                <i class="bi bi-download download-icon"></i>
              </button>
              }
            </div>
          </div>
        </div>
        }
      </div>
    </div>
  </div>

  <!-- Image Modal -->
  @if (modalImagenAbierto) {
    <div class="image-modal" (click)="cerrarModalImagen()">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <button class="close-button" (click)="cerrarModalImagen()" title="Cerrar">
          <i class="bi bi-x-lg"></i>
        </button>
        <div class="modal-image-wrapper">
          <img
            [src]="evento.fotoEvento?.url || '../../../../assets/media/default.webp'"
            [alt]="evento.titulo"
            class="modal-img"
            (click)="$event.stopPropagation()"
          />
        </div>
        <div class="modal-caption">{{ evento.titulo }}</div>
      </div>
    </div>
  }
  </div>
}

@if (!evento) {
  <ngx-spinner
    bdColor="rgba(0, 0, 0, 0.8)"
    size="medium"
    color="#fff"
    type="ball-clip-rotate"
    [fullScreen]="true"
  >
    <p style="color: white">Cargando evento...</p>
  </ngx-spinner>
}
