<div class="contact-container container-fluid d-flex align-items-center justify-content-center py-5 mt-5">
  <div class="row w-100 mx-2 mx-lg-5 rounded overflow-hidden">
    <div class="left-section col-lg-6 d-flex flex-column align-items-center justify-content-center p-5 text-white">
      <div class="text-center mb-4">
        <h1 class="display-4 fw-bold">MOI'S KIM DO</h1>
        <h2 class="h1 fw-light">Taekwondo</h2>
      </div>
      <img src="../../../../assets/media/Logo_escuela.svg" alt="Logo de la escuela" class="img-fluid logo mb-4">
    </div>

    <div class="right-section col-lg-6 bg-white p-4 p-lg-5">
      <h3 class="mb-4 text-center fw-bold">Contáctanos</h3>
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="nombre" formControlName="nombre" placeholder="Nombre" required>
          <label for="nombre">Nombre</label>
          <div *ngIf="contactForm.get('nombre')?.invalid && contactForm.get('nombre')?.touched"
            class="text-danger mt-1">
            El campo nombre es obligatorio.
          </div>
        </div>

        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="apellidos" formControlName="apellidos" placeholder="Apellidos"
            required>
          <label for="apellidos">Apellidos</label>
          <div *ngIf="contactForm.get('apellidos')?.invalid && contactForm.get('apellidos')?.touched"
            class="text-danger mt-1">
            El campo apellidos es obligatorio.
          </div>
        </div>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" formControlName="email" placeholder="Correo electrónico"
            required>
          <label for="email">Correo electrónico</label>
          <div *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched" class="text-danger mt-1">
            Debes proporcionar un email válido.
          </div>
        </div>

        <div class="form-floating mb-3">
          <select class="form-select" id="asunto" formControlName="asunto" required>
            <option value="" disabled selected>Selecciona un asunto</option>
            <option value="Inscripción">Inscripción</option>
            <option value="Consulta de horarios">Consulta de horarios</option>
            <option value="Información sobre clases">Información sobre clases</option>
            <option value="Otros">Otros motivos</option>
          </select>
          <label for="asunto">Asunto</label>
          <div *ngIf="contactForm.get('asunto')?.invalid && contactForm.get('asunto')?.touched"
            class="text-danger mt-1">
            El campo asunto es obligatorio.
          </div>
        </div>

        <div class="form-floating mb-3">
          <textarea class="form-control" placeholder="Mensaje" id="mensaje" formControlName="mensaje"
            style="height: 150px;" required></textarea>
          <label for="mensaje">Cuerpo del mensaje</label>
          <div *ngIf="contactForm.get('mensaje')?.invalid && contactForm.get('mensaje')?.touched"
            class="text-danger mt-1">
            El campo mensaje es obligatorio.
          </div>
        </div>

        <div class="d-flex flex-column flex-md-row gap-3 justify-content-center mt-4">
          <button type="button" class="btn btn-success btn-lg w-100 w-md-auto px-4" (click)="enviarWhatsApp()"
            [disabled]="contactForm.invalid">
            <i class="bi bi-whatsapp me-2"></i>WhatsApp
          </button>
          <button type="submit" class="btn btn-primary btn-lg w-100 w-md-auto px-4" [disabled]="contactForm.invalid">
            <i class="bi bi-envelope me-2"></i>Enviar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
