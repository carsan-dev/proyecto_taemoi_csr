<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <!-- Left Section - Branding -->
      <div class="login-left">
        <div class="branding-content">
          <div class="brand-icon">
            <i class="bi bi-shield-lock-fill"></i>
          </div>
          <h1 class="brand-title">BIENVENIDO</h1>
          <p class="brand-subtitle">Inicia sesión en tu cuenta</p>
          <img src="../../../../assets/media/Logo_escuela.svg" alt="Logo de la escuela" class="brand-logo">
          <div class="brand-features">
            <div class="feature-item">
              <i class="bi bi-check-circle-fill"></i>
              <span>Acceso seguro</span>
            </div>
            <div class="feature-item">
              <i class="bi bi-check-circle-fill"></i>
              <span>Gestión completa</span>
            </div>
            <div class="feature-item">
              <i class="bi bi-check-circle-fill"></i>
              <span>Actualizaciones en tiempo real</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Section - Login Form -->
      <div class="login-right">
        <div class="form-header">
          <h2 class="form-title">Iniciar Sesión</h2>
          <p class="form-description">Introduce tus credenciales de admin para acceder</p>
        </div>

        <form (ngSubmit)="login()" class="login-form">
          <!-- Email Field -->
          <div class="form-group">
            <div class="input-wrapper">
              <i class="bi bi-envelope-fill input-icon"></i>
              <input
                type="email"
                class="form-input"
                id="email"
                name="email"
                [(ngModel)]="credenciales.email"
                placeholder=" "
                required
                autocomplete="email">
              <label for="email" class="form-label">Correo electrónico</label>
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <div class="input-wrapper">
              <i class="bi bi-lock-fill input-icon"></i>
              <input
                [type]="passwordFieldType"
                class="form-input"
                id="contrasena"
                name="contrasena"
                [(ngModel)]="credenciales.contrasena"
                placeholder=" "
                required
                autocomplete="current-password">
              <label for="contrasena" class="form-label">Contraseña</label>
              <button
                type="button"
                class="password-toggle"
                (click)="togglePasswordVisibility()"
                aria-label="Toggle password visibility">
                <i [ngClass]="passwordToggleIcon"></i>
              </button>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="form-group remember-group">
            <label class="remember-label">
              <input
                type="checkbox"
                name="rememberMe"
                [(ngModel)]="credenciales.rememberMe" />
              <span>Recordarme 30 dias</span>
            </label>
          </div>

          <!-- Submit Button -->
          <div class="form-actions">
            <button type="submit" class="btn btn-login">
              <i class="bi bi-box-arrow-in-right"></i>
              <span>Iniciar Sesión</span>
            </button>
          </div>

          <!-- Divider -->
          <div class="divider">
            <span>O</span>
          </div>

          <!-- Google Login Button -->
          <div class="form-actions">
            <button type="button" class="btn btn-google" (click)="loginWithGoogle()">
              <i class="bi bi-google"></i>
              <span>Continuar con Google</span>
            </button>
          </div>

          <!-- Info Message for Students -->
          <div class="info-message">
            <i class="bi bi-info-circle-fill"></i>
            <p><strong>Alumnos:</strong> Utiliza el botón "Continuar con Google" para acceder a tu cuenta y consultar tus horarios y clases.</p>
          </div>

          <!-- Additional Links -->
          <div class="form-footer">
            <a href="/inicio" class="footer-link">
              <i class="bi bi-arrow-left-circle"></i>
              Volver al inicio
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
