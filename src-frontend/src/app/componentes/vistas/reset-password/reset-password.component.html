<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Nueva contraseña</h1>
      <p>Introduce y confirma tu nueva contraseña para continuar.</p>
    </div>

    @if (!token) {
      <div class="auth-error">
        El enlace no es válido o ha caducado.
      </div>
    }

    <form class="auth-form" (ngSubmit)="actualizarContrasena()">
      <label for="nuevaContrasena">Nueva contraseña</label>
      <div class="password-row">
        <input
          id="nuevaContrasena"
          name="nuevaContrasena"
          type="password"
          [type]="tipoContrasena"
          [(ngModel)]="nuevaContrasena"
          required
          autocomplete="new-password">
        <button type="button" class="toggle-btn" (click)="toggleMostrarContrasena()" aria-label="Mostrar contraseña">
          <i class="bi" [ngClass]="mostrarContrasena ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <div class="password-rules">
        <p>Requisitos:</p>
        <ul>
          <li [class.ok]="tieneMinimo" [class.bad]="!tieneMinimo">
            <i class="bi" [ngClass]="tieneMinimo ? 'bi-check-circle-fill' : 'bi-x-circle'"></i>
            Mínimo 8 caracteres
          </li>
          <li [class.ok]="tieneMayuscula" [class.bad]="!tieneMayuscula">
            <i class="bi" [ngClass]="tieneMayuscula ? 'bi-check-circle-fill' : 'bi-x-circle'"></i>
            Al menos 1 mayúscula
          </li>
          <li [class.ok]="tieneMinuscula" [class.bad]="!tieneMinuscula">
            <i class="bi" [ngClass]="tieneMinuscula ? 'bi-check-circle-fill' : 'bi-x-circle'"></i>
            Al menos 1 minúscula
          </li>
          <li [class.ok]="tieneNumero" [class.bad]="!tieneNumero">
            <i class="bi" [ngClass]="tieneNumero ? 'bi-check-circle-fill' : 'bi-x-circle'"></i>
            Al menos 1 número
          </li>
          <li [class.ok]="contrasenasCoinciden" [class.bad]="!contrasenasCoinciden && confirmarContrasena.length">
            <i class="bi" [ngClass]="contrasenasCoinciden ? 'bi-check-circle-fill' : 'bi-x-circle'"></i>
            Coinciden
          </li>
        </ul>
      </div>

      <label for="confirmarContrasena">Confirmar contraseña</label>
      <input
        id="confirmarContrasena"
        name="confirmarContrasena"
        type="password"
        [type]="tipoContrasena"
        [(ngModel)]="confirmarContrasena"
        required
        autocomplete="new-password">

      <button type="submit" [disabled]="!puedeEnviar">
        {{ enviando ? 'Guardando...' : 'Actualizar contraseña' }}
      </button>
    </form>

    <div class="auth-footer">
      <button type="button" class="link-button" (click)="volverAlLogin()">Volver al login</button>
    </div>
  </div>
</div>
