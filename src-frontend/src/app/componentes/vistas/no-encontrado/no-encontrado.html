<div class="not-found-page">
  <div class="not-found-container">
    <div class="not-found-content">
      <!-- 404 Badge -->
      <div class="error-badge">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span class="error-code">404</span>
      </div>

      <!-- Main Message -->
      <h1 class="error-title">Página no encontrada</h1>
      <p class="error-description">
        Lo sentimos, la página que estás buscando no existe o ha sido movida.
      </p>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="btn btn-primary" routerLink="/">
          <i class="bi bi-house-door-fill"></i>
          <span>Volver al inicio</span>
        </button>
        <button class="btn btn-secondary" (click)="volver()">
          <i class="bi bi-arrow-left-circle"></i>
          <span>Página anterior</span>
        </button>
      </div>

      <!-- Quick Links -->
      <div class="quick-links">
        <h2 class="quick-links-title">Enlaces rápidos</h2>
        <div class="links-grid">
          <a routerLink="/taekwondo" class="quick-link">
            <i class="bi bi-trophy-fill"></i>
            <span>Taekwondo</span>
          </a>
          <a routerLink="/kickboxing" class="quick-link">
            <i class="bi bi-lightning-charge-fill"></i>
            <span>Kickboxing</span>
          </a>
          <a routerLink="/pilates" class="quick-link">
            <i class="bi bi-heart-pulse-fill"></i>
            <span>Pilates</span>
          </a>
          <a routerLink="/defensapersonalfemenina" class="quick-link">
            <i class="bi bi-shield-fill-check"></i>
            <span>Defensa Personal</span>
          </a>
          <a routerLink="/eventos" class="quick-link">
            <i class="bi bi-calendar-event-fill"></i>
            <span>Eventos</span>
          </a>
          <a routerLink="/horarios" class="quick-link">
            <i class="bi bi-clock-fill"></i>
            <span>Horarios</span>
          </a>
          <a routerLink="/tarifas" class="quick-link">
            <i class="bi bi-tag-fill"></i>
            <span>Tarifas</span>
          </a>
          <a routerLink="/contacto" class="quick-link">
            <i class="bi bi-envelope-fill"></i>
            <span>Contacto</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
