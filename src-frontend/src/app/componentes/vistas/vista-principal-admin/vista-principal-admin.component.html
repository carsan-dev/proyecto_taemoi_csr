<div class="admin-dashboard-container">
  <div class="dashboard-content container mt-5">
    <div class="intro text-center mb-5">
      <h1 class="mb-3">Panel Principal</h1>
      <p class="lead">Elige una sección para gestionar y mantener el sistema al día</p>
    </div>

    <div class="row">
      <div class="col-md-4 mb-4" *ngFor="let seccion of seccionesAdmin">
        <div class="card admin-option h-100 shadow-sm">
          <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
            <i class="{{ seccion.icono }} icono-admin"></i>
            <h5 class="card-title mt-3">{{ seccion.titulo }}</h5>
            <p class="card-text">{{ seccion.descripcion }}</p>
            <button class="btn btn-primary mt-3" [routerLink]="[seccion.ruta]">Ir a {{ seccion.titulo }}</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
