<div class="admin-page-container">
  <div class="container">
    <!-- Page Header -->
    <div class="admin-page-header text-center">
      <h1>
        <i class="bi bi-speedometer2"></i>
        Panel Principal de Administración
      </h1>
      <p>Gestiona todos los aspectos de tu escuela desde un solo lugar</p>
    </div>

    <!-- Navigation Cards Grid -->
    <div class="row g-4">
      @for (seccion of seccionesAdmin; track seccion.ruta) {
        <div class="col-12 col-md-6 col-lg-4">
          <a [routerLink]="[seccion.ruta]" class="admin-nav-card">
            <div class="nav-icon">
              <i [class]="seccion.icono"></i>
            </div>
            <h3>{{ seccion.titulo }}</h3>
            <p>{{ seccion.descripcion }}</p>
            <button class="admin-btn admin-btn-primary">
              <span>Gestionar {{ seccion.titulo }}</span>
              <i class="bi bi-arrow-right"></i>
            </button>
          </a>
        </div>
      }
    </div>
  </div>
</div>
