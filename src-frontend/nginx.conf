user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # Log format detallado para debugging
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  detailed;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;

    # Timeouts extendidos para conexiones WiFi
    keepalive_timeout  300;
    keepalive_requests 1000;

    # Client timeouts
    client_body_timeout 300s;
    client_header_timeout 300s;

    # Send timeout
    send_timeout 300s;

    # Reset timedout connection
    reset_timedout_connection on;

    # Enable Gzip compression
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Brotli compression (if available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Upstream backend with keepalive connections
    upstream backend {
        server springboot:8080;
        keepalive 32;  # Pool of 32 persistent connections
    }

    include /etc/nginx/conf.d/*.conf;
}
