# Production Profile Configuration for TaeMoi Application

spring.application.name=spring-security
spring.main.allow-bean-definition-overriding=true
spring.main.lazy-initialization=false

# JWT Configuration
jwt.secret=${JWT_SECRET}

# Server Configuration
server.port=8080
server.error.whitelabel.enabled=false

# Compression Configuration
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# HTTP/2 Support
server.http2.enabled=true

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=TaemoiHikariCP

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Banner
spring.banner.location=classpath:taemoi_logo.txt

# CORS Configuration
cors.allowed.origin=${CORS_ALLOWED_ORIGIN}

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.default-encoding=UTF-8
spring.mail.from=${SPRING_MAIL_FROM:noreplymoiskimdo@gmail.com}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Static Resources Configuration
spring.mvc.static-path-pattern=/imagenes/**

# File Storage Paths (Production uses Docker volumes)
app.imagenes.directorio.linux=/var/www/app/imagenes/
app.imagenes.directorio.windows=/var/www/app/imagenes/
app.documentos.directorio.linux=/var/www/app/documentos/
app.documentos.directorio.windows=/var/www/app/documentos/

# Base URL (will be served through Nginx reverse proxy)
app.base.url=${APP_BASE_URL:https://your-domain.com}

# Security Configuration
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# Logging Configuration
logging.level.root=INFO
logging.level.com.taemoi.project=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
