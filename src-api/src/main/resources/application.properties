spring.application.name=spring-security
spring.profiles.active=@spring.profiles.active@
spring.main.allow-bean-definition-overriding=true
spring.main.lazy-initialization=true

jwt.secret=${JWT_SECRET}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

server.port=8080
server.error.whitelabel.enabled=false

# Compression Configuration
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# HTTP/2 Support
server.http2.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1
spring.flyway.baseline-description=existing-schema
spring.flyway.connect-retries=10

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=TaemoiHikariCP

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.banner.location=classpath:taemoi_logo.txt
cors.allowed.origin=${CORS_ALLOWED_ORIGIN}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.servlet.multipart.max-file-size=50MB
spring.mail.default-encoding=UTF-8
spring.mail.from=noreplymoiskimdo@gmail.com
spring.mvc.static-path-pattern=/imagenes/**
# File storage paths - now using environment variables for flexibility
app.imagenes.directorio.linux=${APP_IMAGENES_PATH_DOCKER:/var/www/app/imagenes/alumnos/}
app.imagenes.directorio.windows=${APP_IMAGENES_PATH:C:/Users/croly/Documents/proyecto_taemoi_csr/static_resources/imagenes/alumnos/}
app.documentos.directorio.linux=${APP_DOCUMENTOS_PATH_DOCKER:/var/www/app/documentos/}
app.documentos.directorio.windows=${APP_DOCUMENTOS_PATH:C:/Users/croly/Documents/proyecto_taemoi_csr/static_resources/documentos/}
app.base.url=http://localhost:8080
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

# Logging Configuration
# Suppress PDFBox font warnings for corrupted system fonts
logging.level.org.apache.pdfbox.pdmodel.font=ERROR
logging.level.org.apache.fontbox=ERROR

# Auditoria global (cada 12 meses actualmente)
audit.retention.months=12
audit.retention.cleanup-cron=0 15 3 * * *

# Recordatorios de racha diaria
streak.reminder.enabled=true
streak.reminder.window-hours=3
streak.reminder.cron=0 */10 * * * *
