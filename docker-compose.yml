services:
  database:
    container_name: mysql
    env_file:
      - .env
    build:
      context: ./mysql
      dockerfile: Dockerfile
    volumes:
      - db_data:/var/lib/mysql
    environment:
     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
     MYSQL_DATABASE: ${MYSQL_DATABASE}
     MYSQL_USER: ${MYSQL_USER}
     MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taemoi-network

  backend:
    build:
      context: ./src-api
      dockerfile: Dockerfile
    container_name: springboot
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL_DOCKER: ${SPRING_DATASOURCE_URL_DOCKER}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
      APP_IMAGENES_PATH_DOCKER: ${APP_IMAGENES_PATH_DOCKER}
      APP_DOCUMENTOS_PATH_DOCKER: ${APP_DOCUMENTOS_PATH_DOCKER}
    volumes:
      - .env:/app/.env:ro
      # Named volumes for persistent storage (production-ready)
      - imagenes_data:/var/www/app/imagenes
      - documentos_data:/var/www/app/documentos

      # Alternative: Bind mounts for development (uncomment if needed)
      # - ./static_resources/imagenes:/var/www/app/imagenes
      # - ./static_resources/documentos:/var/www/app/documentos
    networks:
      - taemoi-network

  frontend:
    build:
      context: ./src-frontend
      dockerfile: Dockerfile
    container_name: angular
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./src-frontend/dist/taemoi-angular-front/browser:/usr/share/nginx/html
      - ./src-frontend/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - taemoi-network
    # Restart policy para mantener el servicio disponible
    restart: unless-stopped
    # Health check para nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db_data:
  imagenes_data:
  documentos_data:

networks:
  taemoi-network:
    driver: bridge
